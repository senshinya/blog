# Netlify 只从 base directory（本项目为仓库根）读这个文件。
# 放进 public/ 是不行的 —— 那样它只会被当成静态资源发布到 dist/netlify.toml，不会被解析。

# ── 自定义 giscus 主题 CSS ────────────────────────────────────────────
# giscus 的 iframe（origin 为 giscus.app）跨域来取 /giscus/*.css，故需放行它的 origin。
# 目前 public/giscus/ 下还没有文件，这条是为将来备下的。
#
# 注意：碎语读 reaction 数是**反方向**的事（我们的前端去调 giscus 的接口），
# 那个走 public/_redirects 里的同源代理，不在这里 —— 重定向规则写在 netlify.toml
# 是没用的：Netlify 先处理 _redirects，而 nitro 会往里追加一条 /* 通配兜底，
# 会把这里的一切遮蔽掉。
[[headers]]
  for = "/giscus/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://giscus.app"
